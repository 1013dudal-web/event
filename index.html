<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 행사 신청 확인 시스템</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; }
        .cursor-col-resize { cursor: col-resize; }
        .lucide { display: inline-block; vertical-align: middle; }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-short { animation: bounce-short 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyAzmoqn4B9o5Nk1NSiwZI6lSt2CO4l7XK8",
            authDomain: "school-event-3bd3a.firebaseapp.com",
            projectId: "school-event-3bd3a",
            storageBucket: "school-event-3bd3a.firebasestorage.app",
            messagingSenderId: "135485440786",
            appId: "1:135485440786:web:4270a922ab11a10305a9cb"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'school-event-check-system'; 

        // Lucide 아이콘 브릿지 컴포넌트 (DOM 충돌 방지)
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center shrink-0" style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [events, setEvents] = React.useState([]);
            const [activeEventId, setActiveEventId] = React.useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(true);
            const [sidebarWidth, setSidebarWidth] = React.useState(280); 
            const [isResizing, setIsResizing] = React.useState(false);
            const [isLoading, setIsLoading] = React.useState(true);
            const [statusMsg, setStatusMsg] = React.useState({ text: '', type: '' });
            const [authError, setAuthError] = React.useState(null);
            
            const [editingId, setEditingId] = React.useState(null);
            const [isMainEditing, setIsMainEditing] = React.useState(false);
            const [tempName, setTempName] = React.useState('');
            const [tempDate, setTempDate] = React.useState('');
            const [tempDescription, setTempDescription] = React.useState('');
            const [searchParams, setSearchParams] = React.useState({ class: '1', number: '1', name: '' });
            const [searchResult, setSearchResult] = React.useState(null);
            const [isSearching, setIsSearching] = React.useState(false);

            const classes = Array.from({ length: 12 }, (_, i) => i + 1);
            const numbers = Array.from({ length: 40 }, (_, i) => i + 1);
            const currentEvent = events.find(e => e.id === activeEventId) || events[0] || null;

            // 1. Firebase 인증 및 에러 처리 개선
            React.useEffect(() => {
                const initSignIn = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("인증 에러:", e);
                        if (e.code === 'auth/configuration-not-found') {
                            setAuthError("Firebase 콘솔에서 '익명 로그인'을 활성화해야 합니다.");
                        } else {
                            setAuthError("인증 시스템에 연결할 수 없습니다.");
                        }
                        setIsLoading(false);
                    }
                };
                initSignIn();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setAuthError(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. 데이터 실시간 수신
            React.useEffect(() => {
                if (!user) return;
                // 규칙에 따른 경로 사용
                const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                const unsubscribe = onSnapshot(eventsRef, (snapshot) => {
                    const fetchedEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (fetchedEvents.length === 0) {
                        seedInitialData();
                    } else {
                        const sortedEvents = fetchedEvents.sort((a, b) => (a.order || 0) - (b.order || 0));
                        setEvents(sortedEvents);
                        if (!activeEventId && sortedEvents.length > 0) setActiveEventId(sortedEvents[0].id);
                        setIsLoading(false);
                    }
                }, (error) => {
                    console.error("데이터 수신 오류:", error);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user, activeEventId]);

            const seedInitialData = async () => {
                const batch = writeBatch(db);
                const initialEvents = [
                    { id: '1', name: '꿈 틔움 진로체험활동', date: '2024-04-15', description: '진로체험활동 신청 현황 조회 서비스입니다.', order: 1, data: [] },
                    { id: '2', name: '체육대회', date: '2024-05-20', description: '체육대회 신청 현황을 확인하세요.', order: 2, data: [] }
                ];
                initialEvents.forEach(evt => {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', evt.id);
                    batch.set(docRef, evt);
                });
                await batch.commit();
            };

            const handleResize = (e) => {
                if (isResizing) {
                    const newWidth = e.clientX;
                    if (newWidth > 220 && newWidth < 600) setSidebarWidth(newWidth);
                }
            };

            React.useEffect(() => {
                if (isResizing) {
                    window.addEventListener('mousemove', handleResize);
                    window.addEventListener('mouseup', () => setIsResizing(false));
                }
                return () => {
                    window.removeEventListener('mousemove', handleResize);
                    window.removeEventListener('mouseup', () => setIsResizing(false));
                };
            }, [isResizing]);

            const addEvent = async () => {
                const newId = Date.now().toString();
                const today = new Date().toISOString().split('T')[0];
                const maxOrder = events.length > 0 ? Math.max(...events.map(e => e.order || 0)) : 0;
                const newEvent = { id: newId, name: `새로운 행사`, date: today, description: '', order: maxOrder + 1, data: [] };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', newId), newEvent);
                setActiveEventId(newId);
                startEditing(newEvent, true);
            };

            const deleteEvent = async (id, e) => {
                e.stopPropagation();
                if(confirm("이 행사를 삭제하시겠습니까? 데이터가 모두 사라집니다.")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                }
            };

            const startEditing = (event, fromMain = false) => {
                if (!event) return;
                setEditingId(event.id);
                setTempName(event.name || '');
                setTempDate(event.date || '');
                setTempDescription(event.description || '');
                setIsMainEditing(fromMain);
            };

            const saveEventDetails = async () => {
                if (tempName.trim()) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', editingId), {
                        name: tempName.trim(), date: tempDate, description: tempDescription.trim()
                    }, { merge: true });
                    setStatusMsg({ text: '저장 완료', type: 'success' });
                }
                setEditingId(null);
                setIsMainEditing(false);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !currentEvent) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                        const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', activeEventId), { data }, { merge: true });
                        setStatusMsg({ text: '업로드 성공!', type: 'success' });
                    } catch(err) {
                        setStatusMsg({ text: '파일 처리 오류', type: 'error' });
                    }
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const handleSearch = () => {
                if (!searchParams.name.trim()) return;
                setIsSearching(true);
                setSearchResult(null);
                setTimeout(() => {
                    if (!currentEvent?.data || currentEvent.data.length === 0) {
                        setSearchResult({ error: "데이터가 없습니다. 관리자 메뉴에서 엑셀을 업로드하세요." });
                    } else {
                        const found = currentEvent.data.find(row => 
                            String(row['반'] || row['Class'] || '').trim() === String(searchParams.class) && 
                            String(row['번호'] || row['Number'] || '').trim() === String(searchParams.number) && 
                            String(row['이름'] || row['Name'] || '').trim().replace(/\s/g, "") === searchParams.name.trim().replace(/\s/g, "")
                        );
                        setSearchResult(found || { error: "신청 정보를 찾을 수 없습니다." });
                    }
                    setIsSearching(false);
                }, 800);
            };

            if (authError) return (
                <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-10 text-center">
                    <Icon name="alert-circle" size={64} className="text-red-500 mb-6" />
                    <h1 className="text-2xl font-black text-red-900 mb-4">인증 구성 오류</h1>
                    <p className="text-red-700 font-bold mb-6">{authError}</p>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border text-left max-w-md">
                        <p className="text-sm font-bold mb-2">해결 방법:</p>
                        <ol className="text-xs text-slate-600 space-y-2 list-decimal ml-4">
                            <li>Firebase 콘솔 접속</li>
                            <li><strong>Authentication > Sign-in method</strong>
