<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 행사 신청 확인 시스템</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; }
        .lucide { display: inline-block; vertical-align: middle; }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-short { animation: bounce-short 2s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (사용자님의 실제 값)
        const firebaseConfig = {
            apiKey: "AIzaSyAzmoqn4B9o5Nk1NSiwZI6lSt2CO4l7XK8",
            authDomain: "school-event-3bd3a.firebaseapp.com",
            projectId: "school-event-3bd3a",
            storageBucket: "school-event-3bd3a.firebasestorage.app",
            messagingSenderId: "135485440786",
            appId: "1:135485440786:web:4270a922ab11a10305a9cb"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'school-event-check-system'; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (window.lucide && spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [events, setEvents] = React.useState([]);
            const [activeEventId, setActiveEventId] = React.useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(true);
            const [isLoading, setIsLoading] = React.useState(true);
            const [statusMsg, setStatusMsg] = React.useState({ text: '', type: '' });
            const [authError, setAuthError] = React.useState(null);
            
            const [searchParams, setSearchParams] = React.useState({ class: '1', number: '1', name: '' });
            const [searchResult, setSearchResult] = React.useState(null);
            const [isSearching, setIsSearching] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [tempInfo, setTempInfo] = React.useState({ name: '', date: '', desc: '' });

            const classes = Array.from({ length: 12 }, (_, i) => i + 1);
            const numbers = Array.from({ length: 40 }, (_, i) => i + 1);
            const currentEvent = events.find(e => e.id === activeEventId) || null;

            React.useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Auth Failed:", e);
                        if (e.code === 'auth/configuration-not-found') {
                            setAuthError("Firebase 콘솔에서 '익명 로그인'을 켜주세요.");
                        } else {
                            setAuthError("인증 서버에 연결할 수 없습니다.");
                        }
                        setIsLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setAuthError(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                const unsubscribe = onSnapshot(eventsRef, (snapshot) => {
                    const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = fetched.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setEvents(sorted);
                    if (sorted.length > 0 && !activeEventId) setActiveEventId(sorted[0].id);
                    setIsLoading(false);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            React.useEffect(() => {
                if (statusMsg.text) {
                    const t = setTimeout(() => setStatusMsg({ text: '', type: '' }), 3000);
                    return () => clearTimeout(t);
                }
            }, [statusMsg]);

            const addEvent = async () => {
                const newId = Date.now().toString();
                const newEvent = {
                    id: newId,
                    name: "새로운 행사",
                    date: new Date().toISOString().split('T')[0],
                    description: "여기에 공지사항을 입력하세요.",
                    order: events.length + 1,
                    data: []
                };
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', newId), newEvent);
                    setActiveEventId(newId);
                    setStatusMsg({ text: "행사가 추가되었습니다.", type: "success" });
                } catch (e) {
                    setStatusMsg({ text: "추가 실패. Firestore 규칙을 확인하세요.", type: "error" });
                }
            };

            const deleteEvent = async (id, e) => {
                e.stopPropagation();
                if (!confirm("삭제하시겠습니까? 데이터가 복구되지 않습니다.")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                if (activeEventId === id) setActiveEventId(null);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeEventId) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', activeEventId), { data }, { merge: true });
                    setStatusMsg({ text: `${data.length}명 업로드 완료!`, type: "success" });
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const startEdit = (event) => {
                setEditingId(event.id);
                setTempInfo({ name: event.name, date: event.date, desc: event.description });
            };

            const saveEdit = async () => {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', editingId), {
                    name: tempInfo.name, date: tempInfo.date, description: tempInfo.desc
                }, { merge: true });
                setEditingId(null);
            };

            const handleSearch = () => {
                if (!searchParams.name.trim()) return;
                if (!currentEvent?.data || currentEvent.data.length === 0) {
                    setSearchResult({ error: "데이터가 없습니다. 엑셀을 먼저 업로드해주세요." });
                    return;
                }
                setIsSearching(true);
                setTimeout(() => {
                    const found = currentEvent.data.find(row => 
                        String(row['반'] || '').trim() === String(searchParams.class) && 
                        String(row['번호'] || '').trim() === String(searchParams.number) && 
                        String(row['이름'] || '').trim().replace(/\s/g, "") === searchParams.name.trim().replace(/\s/g, "")
                    );
                    setSearchResult(found || { error: "신청 내역이 없습니다." });
                    setIsSearching(false);
                }, 500);
            };

            if (authError) return (
                <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-6 text-center">
                    <Icon name="alert-triangle" size={64} className="text-red-500 mb-6" />
                    <h1 className="text-2xl font-black text-red-900 mb-4">서비스 설정 필요</h1>
                    <p className="text-red-700 font-bold mb-8">Firebase 익명 로그인이 비활성화되어 있습니다.</p>
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-red-100 text-left max-w-lg">
                        <p className="text-lg font-black text-slate-800 mb-4 font-bold tracking-tight">관리자 해결 방법:</p>
                        <ol className="text-sm text-slate-600 space-y-4 list-decimal ml-5 font-medium leading-relaxed">
                            <li><strong>Firebase 콘솔</strong> 접속</li>
                            <li><strong>Build > Authentication</strong> 메뉴 클릭</li>
                            <li><strong>Sign-in method</strong> 탭으로 이동</li>
                            <li><strong>익명(Anonymous)</strong> 로그인 활성화</li>
                            <li>설정 후 이 페이지를 <strong>새로고침</strong> 하세요.</li>
                        </ol>
                    </div>
                </div>
            );

            if (isLoading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400">시스템 연결 중...</div>;

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    {statusMsg.text && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-xl text-white font-bold animate-bounce-short ${statusMsg.type === 'error' ? 'bg-red-500' : 'bg-slate-800'}`}>
                            {statusMsg.text}
                        </div>
                    )}

                    <aside className={`bg-white border-r flex flex-col transition-all duration-300 ${isSidebarOpen ? 'w-72' : 'w-16'}`}>
                        <div className="p-4 h-16 border-b flex items-center justify-between">
                            {isSidebarOpen && <span className="font-black text-blue-600 truncate uppercase tracking-tighter">Event List</span>}
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1.5 hover:bg-slate-100 rounded-lg">
                                <Icon name={isSidebarOpen ? 'chevron-left' : 'chevron-right'} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-1">
                            {events.map((event) => (
                                <div key={event.id} onClick={() => { setActiveEventId(event.id); setSearchResult(null); }}
                                    className={`p-3 rounded-xl cursor-pointer flex items-center gap-3 transition-all ${activeEventId === event.id ? 'bg-blue-50 text-blue-700 ring-1 ring-blue-100 shadow-sm' : 'hover:bg-slate-50 text-slate-500'}`}>
                                    <Icon name="calendar" size={18} className={activeEventId === event.id ? 'text-blue-500' : 'text-slate-300'} />
                                    {isSidebarOpen && <span className="font-bold text-sm truncate flex-1">{event.name}</span>}
                                    {isSidebarOpen && <button onClick={(e) => deleteEvent(event.id, e)} className="text-red-400 hover:text-red-600"><Icon name="trash-2" size={14} /></button>}
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t">
                            <button onClick={addEvent} className="w-full bg-slate-900 text-white p-3 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-all shadow-lg active:scale-95">
                                <Icon name="plus" size={18} />
                                {isSidebarOpen && <span className="font-bold text-sm">행사 추가</span>}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-6 md:p-12">
                        <div className="max-w-4xl mx-auto">
                            {currentEvent ? (
                                <>
                                    <div className="mb-10 flex flex-col md:flex-row justify-between items-start gap-6 border-b pb-10">
                                        <div className="flex-1">
                                            {editingId === currentEvent.id ? (
                                                <div className="space-y-3 bg-white p-6 rounded-3xl border shadow-xl">
                                                    <input className="w-full font-black p-2 border-b" value={tempInfo.name} onChange={e => setTempInfo({...tempInfo, name: e.target.value})} />
                                                    <input type="date" className="p-2 border rounded-lg text-sm" value={tempInfo.date} onChange={e => setTempInfo({...tempInfo, date: e.target.value})} />
                                                    <textarea className="w-full p-3 border rounded-xl text-sm h-24" value={tempInfo.desc} onChange={e => setTempInfo({...tempInfo, desc: e.target.value})} />
                                                    <div className="flex justify-end gap-2"><button onClick={() => setEditingId(null)}>취소</button><button onClick={saveEdit} className="bg-blue-600 text-white px-4 py-1 rounded-lg">저장</button></div>
                                                </div>
                                            ) : (
                                                <div className="space-y-1">
                                                    <div className="flex items-center gap-3">
                                                        <h1 className="text-4xl font-black text-slate-900">{currentEvent.name}</h1>
                                                        <button onClick={() => startEdit(currentEvent)} className="p-2 text-slate-300 hover:text-blue-500"><Icon name="edit-3" size={20}/></button>
                                                    </div>
                                                    <p className="text-blue-600 font-bold">{currentEvent.date}</p>
                                                    <p className="text-slate-500 mt-4 whitespace-pre-wrap">{currentEvent.description}</p>
                                                </div>
                                            )}
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl shadow-xl border flex flex-col items-center gap-4 shrink-0 min-w-[200px]">
                                            <Icon name={currentEvent.data?.length > 0 ? 'file-check' : 'file-spreadsheet'} size={40} className="text-blue-500" />
                                            <label className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold cursor-pointer hover:bg-blue-700 shadow-lg active:scale-95">
                                                명단 업로드
                                                <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} />
                                            </label>
                                            {currentEvent.data?.length > 0 && <p className="text-xs text-emerald-600 font-bold">{currentEvent.data.length}명 등록됨</p>}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[40px] shadow-2xl p-10 mb-10 border grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                                        <div><label className="text-xs font-bold text-slate-400">반</label><select className="w-full bg-slate-50 p-4 rounded-2xl border-0 ring-1 ring-slate-200" value={searchParams.class} onChange={e => setSearchParams({...searchParams, class: e.target.value})}>{classes.map(c => <option key={c} value={c}>{c}반</option>)}</select></div>
                                        <div><label className="text-xs font-bold text-slate-400">번호</label><select className="w-full bg-slate-50 p-4 rounded-2xl border-0 ring-1 ring-slate-200" value={searchParams.number} onChange={e => setSearchParams({...searchParams, number: e.target.value})}>{numbers.map(n => <option key={n} value={n}>{n}번</option>)}</select></div>
                                        <div><label className="text-xs font-bold text-slate-400">이름</label><input className="w-full bg-slate-50 p-4 rounded-2xl border-0 ring-1 ring-slate-200" placeholder="실명 입력" value={searchParams.name} onChange={e => setSearchParams({...searchParams, name: e.target.value})} /></div>
                                        <button onClick={handleSearch} className="bg-blue-600 h-[60px] text-white rounded-2xl font-black shadow-lg">조회하기</button>
                                    </div>

                                    {searchResult && (
                                        <div className={`p-10 rounded-[48px] border-2 shadow-2xl ${searchResult.error ? 'bg-red-50 border-red-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                            {searchResult.error ? <p className="text-center font-bold text-red-700">{searchResult.error}</p> : (
                                                <div className="flex flex-col md:flex-row gap-12 items-start">
                                                    <div className="bg-emerald-600 text-white p-10 rounded-3xl animate-bounce-short"><Icon name="check-circle-2" size={64} /></div>
                                                    <div className="flex-1">
                                                        <h2 className="text-4xl font-black text-slate-900 mb-4">{searchParams.class}반 {searchParams.number}번 {searchParams.name} 학생</h2>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {Object.entries(searchResult).map(([k,v]) => !['반','번호','이름'].includes(k) && (
                                                                <div key={k} className="bg-white p-5 rounded-2xl border border-emerald-100"><p className="text-xs font-bold text-emerald-500 mb-1">{k}</p><p className="text-xl font-bold">{String(v)}</p></div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </>
                            ) : <div className="text-center py-20 text-slate-300 font-bold">좌측에서 행사를 선택하거나 새로 추가하세요.</div>}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
